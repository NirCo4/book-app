{% extends "base.html" %}
{% block title %}עריכת תנועה #{{ row['id'] }}{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-warning text-dark">
        <h5 class="mb-0"><i class="bi bi-pencil me-2"></i>עריכת תנועה #{{ row['id'] }}</h5>
      </div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">חודש</label>
            <select name="month" class="form-select" required>
              {% for m in months %}
              <option value="{{ m }}" {% if row['month']==m %}selected{% endif %}>{{ month_labels[m] }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">ספר</label>
            <select name="book" class="form-select" required>
              {% for b in books %}
              <option value="{{ b }}" {% if row['book']==b %}selected{% endif %}>{{ b }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="row g-2 mb-3">
            <div class="col">
              <label class="form-label fw-semibold">סטטוס</label>
              <select name="status" class="form-select" required>
                {% for s in statuses %}
                <option value="{{ s }}" {% if row['status']==s %}selected{% endif %}>{{ s }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col">
              <label class="form-label fw-semibold">סוג תנועה</label>
              <select name="type" class="form-select" required>
                {% for t in types %}
                <option value="{{ t }}" {% if row['type']==t %}selected{% endif %}>{{ t }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">פריט</label>
            <select name="item" class="form-select" required>
              {% for i in items %}
              <option value="{{ i }}" {% if row['item']==i %}selected{% endif %}>{{ i }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">סכום (חיובי)</label>
            <div class="input-group">
              <span class="input-group-text">₪</span>
              <input type="number" name="amount" class="form-control"
                     value="{{ row['amount_positive'] }}" min="0.01" step="0.01" required>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">הערות</label>
            <input type="text" name="notes" class="form-control"
                   value="{{ row['notes'] or '' }}">
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning flex-fill">
              <i class="bi bi-save me-1"></i> עדכן
            </button>
            <a href="{{ url_for('entry') }}" class="btn btn-outline-secondary flex-fill">ביטול</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
