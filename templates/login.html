<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>כניסה — הוצאת הספרים</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { background: #f4f6f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { width: 100%; max-width: 380px; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="תשע נשמות" style="height:80px; margin-bottom:12px;">
    <h3 class="fw-bold">הוצאת הספרים</h3>
    <p class="text-muted">יש להתחבר כדי להמשיך</p>
  </div>
  <div class="card border-0 shadow">
    <div class="card-body p-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
        {% endfor %}
      {% endwith %}
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">שם משתמש</label>
          <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">סיסמה</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">כניסה</button>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
